                                <option value="" disabled selected>선택</option>

    <script>
        // 공통 구글 웹 앱 URL (🚨 여기에 새로 발급받은 URL을 붙여넣으세요)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw060eObIprC-WwPiqt00f8bIMz7g_sxUkCC-8W77UmrZrI1td2yqtNeR2BEO3arQnnoQ/exec';

        let carbonChartInstance = null;

        // 웹 페이지 켜질 때 방문객 수 가져오기
        document.addEventListener('DOMContentLoaded', function() {
            fetchVisitorCount();
        });

       function fetchVisitorCount(isReadOnly = false) {
            if (SCRIPT_URL === '' || !SCRIPT_URL.startsWith('http')) return;

            let requestUrl = SCRIPT_URL;
            if (isReadOnly) {
                requestUrl += '?action=read';
            }

            fetch(requestUrl)
                .then(response => response.json())
                .then(data => {
                    // 👇 오늘 방문객과 총 방문객을 모두 화면에 업데이트합니다 👇
                    if(data.totalVisitors !== undefined && data.todayVisitors !== undefined) {
                        document.getElementById('today-count').innerText = data.todayVisitors;
                        document.getElementById('visitor-count').innerText = data.totalVisitors;
                    } else {
                        document.getElementById('today-count').innerText = "-";
                        document.getElementById('visitor-count').innerText = "-";
                    }
                })
                .catch(error => {
                    console.error('방문객 수를 불러오는데 실패했습니다:', error);
                    document.getElementById('today-count').innerText = "오류";
                    document.getElementById('visitor-count').innerText = "오류";
                });
        }

        // 시작하기 버튼 동작
        function startCalculator() {
            const studentId = document.getElementById('student-id').value.trim();
            const studentName = document.getElementById('student-name').value.trim();
            const errorMsg = document.getElementById('login-error');

            if (!studentId || !studentName) {
                errorMsg.classList.remove('hidden');
                return;
            }

            errorMsg.classList.add('hidden');

            document.getElementById('main-page').classList.add('hidden');
            document.getElementById('calculator-page').classList.remove('hidden');
            document.getElementById('calculator-page').classList.add('flex');
            
            document.body.classList.remove('bg-[#eaf5f9]');
            document.body.classList.add('bg-green-50');
        }

        // 뒤로가기 버튼 동작
        function goBack() {
            document.getElementById('calculator-page').classList.add('hidden');
            document.getElementById('calculator-page').classList.remove('flex');
            document.getElementById('main-page').classList.remove('hidden');
            
            document.body.classList.remove('bg-green-50');
            document.body.classList.add('bg-[#eaf5f9]');
            
            document.getElementById('result-area').classList.add('hidden');
        }

        // 탄소 계산 및 구글시트 연동 동작
        function calculateCarbon() {
            const resultArea = document.getElementById('result-area');
            const resultMessage = document.getElementById('result-message');
            const chartContainer = document.getElementById('chart-container');
            
            const transport = document.getElementById('transport').value;
            const transportTime = document.getElementById('transport-time').value;
            const papercup = document.getElementById('papercup').value;
            
            const rice = document.getElementById('food-rice').value;
            const soup = document.getElementById('food-soup').value;
            const side = document.getElementById('food-side').value;

            if (!transport || !transportTime || papercup === "" || rice === "" || soup === "" || side === "") {
                resultArea.classList.remove('hidden');
                chartContainer.classList.add('hidden');
                resultMessage.innerHTML = "<span class='text-orange-500 font-bold'>모든 항목을 빠짐없이 입력해 주세요! 🤔</span>";
                return;
            }

            let transportCarbon = 0;
            let cupCarbon = parseInt(papercup) * 11;
            
            const timeUnits = parseInt(transportTime) / 5;
            if (transport === 'car') transportCarbon = 270 * timeUnits;
            else if (transport === 'bus') transportCarbon = 45 * timeUnits;
            else if (transport === 'subway') transportCarbon = 32 * timeUnits;
            else if (transport === 'bicycle' || transport === 'walk') transportCarbon = 0;

            const R = parseFloat(rice);
            const S = parseFloat(soup);
            const N = parseInt(side);
            let foodCarbon = (R * 300) + (S * 150) + (N * 150);

            let totalCarbon = transportCarbon + cupCarbon + foodCarbon;

            let feedbackMessage = "";
            let feedbackColor = "";

            if (totalCarbon === 0) {
                feedbackMessage = "완벽합니다! 탄소 배출 제로! 진정한 에코 워리어! 🦸‍♂️🦸‍♀️";
                feedbackColor = "text-blue-600";
            } else if (totalCarbon <= 100) {
                feedbackMessage = "훌륭합니다! 지구를 지키는 좋은 습관을 가지고 계시네요! 🌱";
                feedbackColor = "text-blue-600";
            } else {
                const maxCarbon = Math.max(transportCarbon, cupCarbon, foodCarbon);
                
                if (totalCarbon <= 300) {
                    feedbackColor = "text-orange-500";
                } else {
                    feedbackColor = "text-red-500";
                }

                if (maxCarbon === foodCarbon) {
                    feedbackMessage = "급식 잔반에서 탄소 배출이 가장 많네요. 내일은 먹을 만큼만 받아보아요! 🍽️";
                } else if (maxCarbon === transportCarbon) {
                    feedbackMessage = "교통수단에서 탄소 배출이 가장 많네요. 가까운 거리는 걷거나 자전거 어때요? 🚶‍♂️🚲";
                } else if (maxCarbon === cupCarbon) {
                    feedbackMessage = "종이컵 사용으로 인한 배출이 많네요. 내일은 개인 텀블러를 챙겨볼까요? 🥤";
                }
            }

            resultArea.classList.remove('hidden');
            resultArea.classList.remove('bg-gray-50', 'border-gray-200');
            resultArea.classList.add('bg-green-50', 'border-green-300');
            
            resultMessage.innerHTML = `오늘 당신의 탄소 배출량은 <br>
                <strong class='text-3xl text-green-700 mt-2 mb-3 block'>${totalCarbon}g</strong> 입니다.
                <span class='${feedbackColor} font-bold text-md mt-3 block border-t border-green-200 pt-3'>
                    ${feedbackMessage}
                </span>`;
                
            renderChart(transportCarbon, cupCarbon, foodCarbon);

            const studentId = document.getElementById('student-id').value.trim();
            const studentName = document.getElementById('student-name').value.trim();

            sendDataToGoogleSheet(studentId, studentName, totalCarbon, transport, transportTime, transportCarbon, papercup, cupCarbon, rice, soup, side, foodCarbon);
        }

        // 구글 시트로 POST 전송
        function sendDataToGoogleSheet(studentId, studentName, totalCarbon, transport, transportTime, transportCarbon, papercup, cupCarbon, rice, soup, side, foodCarbon) {
            
            if (SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbw060eObIprC-WwPiqt00f8bIMz7g_sxUkCC-8W77UmrZrI1td2yqtNeR2BEO3arQnnoQ/exec' || SCRIPT_URL === '') {
                console.log("Web App URL이 입력되지 않았습니다. 시트 연동을 건너뜁니다.");
                return;
            }

            const data = {
                studentId: studentId,
                studentName: studentName,
                totalCarbon: totalCarbon,
                transport: transport,
                transportTime: transportTime,
                transportCarbon: transportCarbon,
                papercup: papercup,
                cupCarbon: cupCarbon,
                rice: rice,
                soup: soup,
                side: side,
                foodCarbon: foodCarbon
            };

            const resultMessage = document.getElementById('result-message');
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify(data)
            })
            .then(() => {
                resultMessage.innerHTML += `<div class="mt-4 text-sm text-blue-600 font-bold bg-blue-50 p-3 rounded-lg shadow-inner">✅ 선생님의 구글 시트로 기록이 성공적으로 전송되었습니다!</div>`;
                // 제출 완료 후 방문객 수 새로고침
                fetchVisitorCount(true); 
            })
            .catch(error => {
                console.error('전송 중 오류 발생:', error);
                resultMessage.innerHTML += `<div class="mt-4 text-sm text-red-500 font-bold bg-red-50 p-2 rounded-lg">❌ 구글 시트 전송에 실패했습니다. (콘솔 확인)</div>`;
            });
        }

        function renderChart(transport, cup, food) {
            const chartContainer = document.getElementById('chart-container');
            const ctx = document.getElementById('carbonChart').getContext('2d');
            
            chartContainer.classList.remove('hidden');

            if (carbonChartInstance) {
                carbonChartInstance.destroy();
            }

            carbonChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['등교 수단 🚌', '종이컵 ☕️', '급식 잔반 🍽️'],
                    datasets: [{
                        label: '배출량 (g)',
                        data: [transport, cup, food],
                        backgroundColor: [
                            'rgba(54, 162, 235, 0.6)',
                            'rgba(255, 206, 86, 0.6)',
                            'rgba(255, 99, 132, 0.6)'
                        ],
                        borderColor: [
                            'rgba(54, 162, 235, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(255, 99, 132, 1)'
                        ],
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) { return context.parsed.y + 'g'; }
                            }
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0, 0, 0, 0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>
</html>
